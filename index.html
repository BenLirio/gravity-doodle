<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Doodle</title>
  <meta property="og:title" content="Gravity Doodle">
  <meta property="og:description" content="Draw any shape, then drop hundreds of sand particles and watch them pour through your sculpture.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benlirio.com/gravity-doodle/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="feedback.js" defer></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>gravity doodle</h1>
      <p id="tagline">draw, drop, keep drawing as it falls</p>
    </header>

    <div id="controls">
      <!-- DRAW PHASE: pen / erase / clear / drop -->
      <div id="draw-controls">
        <div id="tool-row" role="group" aria-label="drawing tool">
          <span id="tool-label">tool:</span>
          <button id="btn-draw" class="tool-btn active" onclick="setMode('draw')" aria-pressed="true">pen</button>
          <button id="btn-erase" class="tool-btn" onclick="setMode('erase')" aria-pressed="false">erase</button>
          <button id="btn-clear" class="tool-btn clear-btn" onclick="clearAll()">clear</button>
        </div>
        <div id="action-row">
          <button id="btn-drop" onclick="startDrop()">drop the sand</button>
        </div>
      </div>

      <!-- PHYSICS PHASE: draw/erase during flow / pour more / reset / share -->
      <div id="physics-controls" class="hidden">
        <div id="phys-tool-row" role="group" aria-label="edit while sand flows">
          <span id="phys-tool-label">edit live:</span>
          <button id="btn-draw-phys" class="tool-btn active" onclick="setMode('draw')" aria-pressed="true">pen</button>
          <button id="btn-erase-phys" class="tool-btn" onclick="setMode('erase')" aria-pressed="false">erase</button>
        </div>
        <div id="physics-row">
          <button id="btn-pour" class="phys-btn" onclick="startDrop()">pour more</button>
          <button id="btn-reset" class="phys-btn reset-btn" onclick="clearAll()">reset</button>
        </div>
        <div id="share-row">
          <button id="btn-share" onclick="shareSculpture()">share this sculpture</button>
        </div>
        <p id="share-status" class="share-status"></p>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="overlay-msg" class="hidden"></div>
    </div>
  </div>
</body>
</html>
