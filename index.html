<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Doodle</title>
  <meta property="og:title" content="Gravity Doodle">
  <meta property="og:description" content="Invent new elements with AI and watch them fight gravity. A tiny falling-sand sandbox where the rules are yours.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benlirio.com/gravity-doodle/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <script src="feedback.js" defer></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>gravity doodle</h1>
      <p id="tagline">invent elements. watch them fight gravity.</p>
    </header>

    <div id="controls">
      <div id="action-row">
        <button id="btn-drop" onclick="startDrop()">pour sand</button>
        <button id="btn-reset" onclick="clearAll()">reset</button>
      </div>

      <div id="tool-row" role="group" aria-label="material palette">
        <div class="palette-label">paint:</div>
        <div id="palette-buttons">
          <!-- built-in material buttons, rendered by JS -->
        </div>
        <button id="btn-invent" class="invent-btn" onclick="openInvent()" aria-label="invent new element">
          <span class="invent-plus">+</span>
          <span class="invent-label">invent element</span>
        </button>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="overlay-msg" class="hidden"></div>
    </div>

    <p id="hint">paint on the canvas. tap "invent element" to add your own rule.</p>
  </div>

  <!-- Invent modal -->
  <div id="invent-overlay" class="invent-overlay hidden" role="dialog" aria-labelledby="invent-title">
    <div class="invent-modal">
      <h3 id="invent-title">invent a new element</h3>
      <p class="invent-hint">name it. describe how it behaves. the AI generates the physics.</p>
      <label for="invent-name" class="invent-field-label">name</label>
      <input id="invent-name" type="text" maxlength="20" placeholder="e.g. lava, honey, glitter, acid">
      <label for="invent-desc" class="invent-field-label">what it does <span class="invent-optional">(optional)</span></label>
      <textarea id="invent-desc" maxlength="240" placeholder="e.g. thick molten rock that burns plants and sinks in water"></textarea>
      <p id="invent-status" class="invent-status"></p>
      <div class="invent-row">
        <button type="button" id="invent-cancel" onclick="closeInvent()">cancel</button>
        <button type="button" id="invent-submit" class="primary" onclick="submitInvent()">invent</button>
      </div>
    </div>
  </div>
</body>
</html>
